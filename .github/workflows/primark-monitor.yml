name: Primark Daily Diff Monitor

on:
  push:
    branches: [main]
    paths:
      - 'sfera_monitor.py'
      - 'config.example.json'
      - '.github/workflows/primark-monitor.yml'
  schedule:
    # GitHub Actions uses UTC. 01:57 UTC = 09:57 China time.
    # Staggered after Sfera, Bijou, Bershka, Lovisa, and Stradivarius to reduce state commit conflicts.
    - cron: '57 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: primark-daily-diff-monitor
  cancel-in-progress: false

jobs:
  primark:
    name: Primark Daily Diff
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Primark monitor
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: python sfera_monitor.py --site primark

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f state/*.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Primark monitor state [skip ci]"
            git push
          fi
