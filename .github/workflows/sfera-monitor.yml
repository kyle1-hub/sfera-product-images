name: Sfera NUEVO Monitor

on:
  push:
    branches: [main]
    paths:
      - 'sfera_monitor.py'
      - 'config.example.json'
      - '.github/workflows/sfera-monitor.yml'
  schedule:
    # GitHub Actions uses UTC. 01:07 UTC = 09:07 China time.
    - cron: '7 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sfera-nuevo-monitor
  cancel-in-progress: false

jobs:
  sfera:
    name: Sfera NUEVO
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sfera monitor
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: python sfera_monitor.py --site sfera

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f state/*.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Sfera monitor state [skip ci]"
            git push
          fi
