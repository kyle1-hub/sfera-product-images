name: Bijou Brigitte Neu Monitor

on:
  schedule:
    # GitHub Actions uses UTC. 01:17 UTC = 09:17 China time.
    # Staggered after Sfera to reduce state commit conflicts.
    - cron: '17 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bijou-brigitte-neu-monitor
  cancel-in-progress: false

jobs:
  bijou:
    name: Bijou Brigitte Neu
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bijou Brigitte monitor
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: python sfera_monitor.py --site bijou

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f state/*.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Bijou Brigitte monitor state [skip ci]"
            git push
          fi
