name: Bershka Daily Diff Monitor

# Paused while the Bershka monitoring logic is being redesigned.
# Keep manual dispatch available for controlled validation only.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bershka-daily-diff-monitor
  cancel-in-progress: false

jobs:
  bershka:
    name: Bershka Daily Diff
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bershka monitor
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: python sfera_monitor.py --site bershka

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f state/*.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Bershka monitor state [skip ci]"
            git push
          fi
